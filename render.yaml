services:
  - type: web
    name: mypet-backend
    runtime: docker
    repo: https://github.com/MatheusCarneir0/mypet-backend.git
    branch: main
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        value: django-insecure-troque-essa-chave
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: DB_NAME
        value: mypet
      - key: DB_USER
        value: mypet_user
      - key: DB_PASSWORD
        value: mypet_password
      - key: DB_HOST
        value: db
      - key: DB_PORT
        value: "5432"
      - key: REDIS_HOST
        value: redis
      - key: REDIS_PORT
        value: "6379"
      - key: CELERY_BROKER_URL
        value: redis://redis:6379/0
      - key: CELERY_RESULT_BACKEND
        value: redis://redis:6379/0
